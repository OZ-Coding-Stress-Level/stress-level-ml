# 데이터 경로
data:
  raw_dir: "data/raw"
  train_file: "train.csv"
  test_file: "test.csv"
  submission_file: "sample_submission.csv"

# 피처 정보
features:
  target: "stress_score"
  id_col: "ID" # 샘플별 고유 ID

  # 수치형 변수
  numerical:
    - age # 연령
    - height # 키(cm)
    - weight # 몸무게(kg)
    - cholesterol # 콜레스테롤 수치
    - systolic_blood_pressure # 수축기 혈압
    - diastolic_blood_pressure # 이완기 혈압
    - glucose # 혈당 수치(mg/dL)
    - bone_density # 골밀도(g/cm²)
    - mean_working # 1주일당 평균 근로 시간

  # 범주형 변수
  categorical:
    - gender # 성별
    - activity # 생활시 운동 강도
    - smoke_status # 흡연 상태
    - medical_history # 만성질환
    - family_medical_history # 가족력
    - sleep_pattern # 수면패턴
    - edu_level # 학력

# 출력 경로
output:
  dir: "outputs"
  submissions: "submissions"